<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家族传承 - 翻阅族谱</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <style>
        body { 
            background-color: #FDFBF7; 
            background-image: url('https://www.transparenttextures.com/patterns/rice-paper.png'); 
            font-family: 'STKaiti', 'KaiTi', 'PingFang SC', serif;
            margin: 0; padding: 0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        /* 翻页容器大小 */
        .swiper { width: 100%; max-width: 420px; height: 90vh; }

        /* 单个卡片样式 */
        .profile-card { 
            background: #FFFFFF; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(139, 0, 0, 0.08);
            border: 1px solid #EAE0D5; overflow: hidden;
            height: 100%; display: flex; flex-direction: column;
        }

        .header-bg { background: #8B0000; height: 30px; width: 100%; }
        
        /* 第一页特有样式 */
        .avatar-container { 
            margin: -20px auto 10px; width: 120px; height: 120px; 
            padding: 5px; border: 2px dashed #C8A97E; border-radius: 50%; background: #fff;
        }
        .avatar-container img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .name { font-size: 28px; color: #8B0000; margin: 5px 0; font-weight: bold; text-align:center; }
        .info-section { background: rgba(250, 250, 248, 0.8); padding: 15px; margin: 10px 20px; border-radius: 10px; border: 1px solid #eee; }
        .label { color: #8B0000; font-weight: bold; margin-right: 8px; }
        .page-hint { text-align: center; font-size: 12px; color: #C8A97E; margin-top: auto; padding-bottom: 20px; animation: bounce 2s infinite; }

        /* 第二页：传承志详情 */
        .detail-page { padding: 30px 25px; text-align: justify; line-height: 2; color: #444; font-size: 17px; }
        .detail-title { border-bottom: 2px solid #8B0000; display: inline-block; padding-bottom: 5px; margin-bottom: 20px; color: #8B0000; font-weight: bold; }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateX(0);} 40% {transform: translateX(-5px);} 60% {transform: translateX(5px);} }
    </style>
</head>
<body>

<div id="loading" style="color: #8B0000;">开启卷轴...</div>

<div class="swiper mySwiper" id="main-container" style="display: none;">
    <div class="swiper-wrapper">
        <div class="swiper-slide">
            <div class="profile-card">
                <div class="header-bg"></div>
                <div class="avatar-container"><img id="m-photo" src=""></div>
                <h1 class="name" id="m-name"></h1>
                <div style="text-align:center; color:#888; font-size:14px;" id="m-birth"></div>
                
                <div class="info-section">
                    <div><span class="label">居所:</span><span id="m-addr"></span></div>
                    <div style="margin-top:8px;"><span class="label">传书:</span><span id="m-phone"></span></div>
                </div>

                <div class="info-section">
                    <div class="label" style="margin-bottom:5px;">生平简述</div>
                    <div id="m-heritage" style="text-indent: 2em;"></div>
                </div>
                <div class="page-hint">左滑翻阅传承志 ➔</div>
            </div>
        </div>

        <div class="swiper-slide">
            <div class="profile-card">
                <div class="header-bg"></div>
                <div class="detail-page">
                    <div class="detail-title">📜 家族传承志</div>
                    <div id="m-detail" style="text-indent: 2em;">暂无详细记载。</div>
                </div>
                <div class="page-hint" style="animation: none;">☚ 右滑返回首页</div>
            </div>
        </div>
    </div>
    <div class="swiper-pagination"></div>
</div>

<audio id="nfcSound" src="https://www.soundjay.com/misc/sounds/page-flip-01a.mp3" preload="auto"></audio>

<script>
    const SUPABASE_URL = 'https://lmaxmseuuscjhnmcbdgq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_SLrEiNjvlJEfNNt-DrZ6NQ_XfYwfdqL'; 
    const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const memberId = Number(urlParams.get('id')) || 1;

    // 初始化滑动效果
    const swiper = new Swiper(".mySwiper", {
        effect: "slide",
        pagination: { el: ".swiper-pagination", clickable: true },
        on: { slideChange: function() { playSound(); } } // 翻页时响一声
    });

    function playSound() {
        const audio = document.getElementById('nfcSound');
        audio.play().catch(()=>{});
    }

    async function fetchData() {
        const { data, error } = await mySupabase.from('family_members').select('*').eq('id', memberId).single();
        if (data) {
            document.getElementById('m-name').innerText = data.name;
            document.getElementById('m-photo').src = data.photo_url || 'https://via.placeholder.com/150';
            document.getElementById('m-birth').innerText = `寿享 ${data.age} 载 | 生于 ${data.birth}`;
            document.getElementById('m-addr').innerText = data.address;
            document.getElementById('m-phone').innerText = data['telephone number'];
            document.getElementById('m-heritage').innerText = data.heritage;
            
            // 如果你在数据库加了新列，这里可以读取新列
            if(data.heritage_detail) {
                document.getElementById('m-detail').innerText = data.heritage_detail;
            } else {
                // 如果没加新列，就把原本的 heritage 复制一份到第二页展示
                document.getElementById('m-detail').innerText = data.heritage;
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-container').style.display = 'block';
            playSound();
        }
    }

    window.onload = fetchData;
</script>
</body>
</html>
