<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林氏家族传承志</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --red: #8B0000; --gold: #C8A97E; --paper: #FDFBF7; }
        body { background: #EAE0D5; margin: 0; font-family: 'PingFang SC', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        #loading-screen { color: var(--red); font-size: 18px; text-align: center; }

        .swiper { width: 100%; max-width: 400px; height: 90vh; display: none; }
        
        .profile-card {
            background: var(--paper); border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            height: 100%; overflow: hidden; position: relative; border: 1px solid rgba(200, 169, 126, 0.4);
        }

        /* 动态纹理层 */
        .bg-watermark {
            position: absolute; inset: 0; opacity: 0.1; pointer-events: none; z-index: 0;
            background-size: 300px;
        }
        .style-calligraphy { background-image: url('https://www.transparenttextures.com/patterns/brush-stroke.png'); opacity: 0.15; }
        .style-circuit { background-image: url('https://www.transparenttextures.com/patterns/circuit-board.png'); }

        .content { position: relative; z-index: 1; padding: 30px 20px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }

        .photo-frame {
            width: 130px; height: 130px; margin: 0 auto 15px; padding: 6px;
            border: 2px solid var(--gold); border-radius: 50%; background: #fff;
        }
        .photo-frame img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .name { font-family: 'Noto Serif SC', serif; font-size: 36px; color: var(--red); text-align: center; letter-spacing: 5px; margin: 5px 0; }
        .motto { text-align: center; color: var(--gold); font-size: 14px; margin-bottom: 20px; font-style: italic; }

        .info-panel { background: rgba(139,0,0,0.03); border-radius: 12px; padding: 15px; border-left: 4px solid var(--red); margin-bottom: 20px; }
        .info-panel p { margin: 8px 0; font-size: 15px; color: #444; line-height: 1.6; }

        /* 系谱树 */
        .kinship-tree { display: flex; flex-direction: column; align-items: center; margin: 20px 0; }
        .node { border: 1px solid var(--gold); padding: 8px 15px; font-size: 13px; border-radius: 4px; background: #fff; min-width: 120px; text-align: center; }
        .node.current { background: var(--red); color: white; border: none; font-weight: bold; }
        .line { width: 1px; height: 15px; background: var(--gold); }

        .hint { margin-top: auto; text-align: center; font-size: 12px; color: var(--gold); }
    </style>
</head>
<body>

<div id="loading-screen">正在开启家族卷轴...</div>

<div class="swiper mySwiper" id="main-app">
    <div class="swiper-wrapper">
        <div class="swiper-slide">
            <div class="profile-card">
                <div class="bg-watermark" id="card-bg-1"></div>
                <div class="content">
                    <div class="photo-frame"><img id="ui-photo" src=""></div>
                    <h1 class="name" id="ui-name">---</h1>
                    <div class="motto" id="ui-motto">加载中...</div>
                    <div class="info-panel">
                        <p id="ui-bio"></p>
                    </div>
                    <div class="hint">左滑查看亲缘 ➔</div>
                </div>
            </div>
        </div>

        <div class="swiper-slide">
            <div class="profile-card">
                <div class="bg-watermark" id="card-bg-2"></div>
                <div class="content">
                    <h3 style="color:var(--red); border-bottom:1px solid var(--gold);">🌳 家族亲缘</h3>
                    <div class="kinship-tree">
                        <div class="node" id="tree-parents">上辈：载入中</div>
                        <div class="line"></div>
                        <div class="node current" id="tree-self">本人</div>
                        <div class="line"></div>
                        <div class="node" id="tree-children">下辈：载入中</div>
                    </div>
                    <h3 style="color:var(--red); border-bottom:1px solid var(--gold); margin-top:25px;">📜 传承详志</h3>
                    <div id="ui-long-bio" style="font-size: 15px; line-height: 2; color:#555; overflow-y: auto; text-indent: 2em;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. 配置信息 (请务必检查 KEY)
    const SB_URL = 'https://lmaxmseuuscjhnmcbdgq.supabase.co';
    const SB_KEY = '替换为您自己的匿名KEY'; // 这里填入你控制台看到的那个长字符串
    
    // 2. 全局定义 mySupabase 变量
    let mySupabase;

    // 获取 URL 中的 ID
    const mid = new URLSearchParams(window.location.search).get('id') || 1;

    // 3. 初始化 Swiper
    const swiper = new Swiper(".mySwiper", { grabCursor: true });

    async function loadFamilyData() {
        // 初始化客户端
        if (window.supabase) {
            mySupabase = window.supabase.createClient(SB_URL, SB_KEY);
        } else {
            document.getElementById('loading-screen').innerText = "库加载失败，请检查网络";
            return;
        }

        // 读取数据
        const { data, error } = await mySupabase
            .from('family_members')
            .select('*')
            .eq('id', mid)
            .single();

        if (error) {
            console.error("读取数据库失败:", error.message);
            document.getElementById('loading-screen').innerText = "数据读取失败，请检查数据库设置";
            return;
        }

        if (data) {
            // 填充 UI
            document.getElementById('ui-name').innerText = data.name;
            document.getElementById('tree-self').innerText = data.name;
            document.getElementById('ui-photo').src = data.photo_url;
            document.getElementById('ui-motto').innerText = `“${data.motto || '厚德载物'}”`;
            document.getElementById('ui-bio').innerText = data.heritage;
            document.getElementById('ui-long-bio').innerText = data.heritage_detail || data.heritage;
            
            document.getElementById('tree-parents').innerText = `父/母：${data.rel_parents || '未详'}`;
            document.getElementById('tree-children').innerText = `子女：${data.rel_children || '未详'}`;

            // 处理背景纹理
            const bg1 = document.getElementById('card-bg-1');
            const bg2 = document.getElementById('card-bg-2');
            if (data.name.includes('振邦')) {
                bg1.classList.add('style-calligraphy');
                bg2.classList.add('style-calligraphy');
            } else if (data.name.includes('远山')) {
                bg1.classList.add('style-circuit');
                bg2.classList.add('style-circuit');
            }

            // 完成加载
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        }
    }

    window.onload = loadFamilyData;
</script>
</body>
</html>
