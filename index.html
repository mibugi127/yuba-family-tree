<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林氏家族传承志</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    
    <style>
        :root { --red: #8B0000; --gold: #C8A97E; --paper: #FDFBF7; }
        body { background: #EAE0D5; margin: 0; font-family: 'PingFang SC', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #loading-screen { color: var(--red); font-size: 18px; font-weight: bold; }
        
        .swiper { width: 100%; max-width: 400px; height: 90vh; display: none; }
        .profile-card { background: var(--paper); border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); height: 100%; overflow: hidden; position: relative; border: 1px solid rgba(200, 169, 126, 0.4); display: flex; flex-direction: column; background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png'); }
        
        .content { padding: 25px; flex: 1; display: flex; flex-direction: column; text-align: center; }
        
        /* 照片框：修复显示 */
        .photo-frame { width: 160px; height: 160px; margin: 0 auto 15px; padding: 6px; border: 2px solid var(--gold); border-radius: 50%; background: #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.15); overflow: hidden; }
        #ui-photo { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        
        .name { font-family: 'Ma Shan Zheng', cursive; font-size: 45px; color: var(--red); margin: 5px 0; letter-spacing: 5px; }
        .motto { font-family: 'Noto Serif SC', serif; font-style: italic; color: #555; font-size: 15px; margin-bottom: 20px; min-height: 24px; }
        .motto::before { content: '“'; color: var(--gold); font-size: 24px; }
        .motto::after { content: '”'; color: var(--gold); font-size: 24px; }

        .info-panel { background: rgba(200, 169, 126, 0.1); border-radius: 15px; padding: 18px; text-align: left; border: 1px solid rgba(200, 169, 126, 0.3); }
        .info-panel p { margin: 10px 0; font-size: 14px; color: #333; border-bottom: 1px solid rgba(139,0,0,0.05); padding-bottom: 5px; display: flex; justify-content: space-between; }
        .info-panel b { color: var(--red); }

        /* 家族关系树 */
        .family-tree { margin-top: 25px; }
        .tree-container { display: flex; flex-direction: column; align-items: center; }
        .node { border: 1px solid var(--gold); padding: 4px 15px; border-radius: 4px; font-size: 13px; background: #fff; color: #666; min-width: 80px; text-align: center; }
        .node.active { background: var(--red); color: #fff; border: none; font-weight: bold; box-shadow: 0 4px 10px rgba(139,0,0,0.3); }
        .tree-line { width: 2px; height: 12px; background: var(--gold); }

        .hint { margin-top: auto; color: var(--gold); font-size: 12px; }
    </style>
</head>
<body>

<div id="loading-screen">林氏族谱加载中...</div>

<div class="swiper mySwiper" id="main-app">
    <div class="swiper-wrapper">
        <div class="swiper-slide">
            <div class="profile-card">
                <div class="content">
                    <div class="photo-frame">
                        <img id="ui-photo" src="https://via.placeholder.com/150" alt="头像">
                    </div>
                    <h1 class="name" id="ui-name">加载中</h1>
                    <div class="motto" id="ui-motto">正在读取座右铭...</div>
                    
                    <div class="info-panel">
                        <p><b>出生日期</b> <span id="ui-birth">-</span></p>
                        <p><b>联系方式</b> <span id="ui-phone">-</span></p>
                        <p><b>居住地址</b> <span id="ui-addr">-</span></p>
                    </div>

                    <div class="family-tree">
                        <div class="tree-container">
                            <div class="node" id="ui-parent">父辈</div>
                            <div class="tree-line"></div>
                            <div class="node active" id="ui-self">本人</div>
                        </div>
                    </div>
                    <div class="hint">左滑翻阅生平记载 ➔</div>
                </div>
            </div>
        </div>

        <div class="swiper-slide">
            <div class="profile-card">
                <div class="content" style="text-align: left;">
                    <h2 style="color:var(--red); font-family:'Ma Shan Zheng'; border-bottom:2px solid var(--gold); padding-bottom:10px;">📜 生平事迹</h2>
                    <div id="ui-bio" style="font-size: 16px; line-height: 1.9; color:#333; text-indent: 2em; padding-top:20px; overflow-y:auto;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. 配置信息 (请确保 Key 正确)
    const SB_URL = 'https://lmaxmseuuscjhnmcbdgq.supabase.co';
    const SB_KEY = 'sb_publishable_SLrEiNjvlJEfNNt-DrZ6NQ_XfYwfdqL'; 

    // 💡 变量名改为 mySupabase 以解决“supabase has already been declared”错误
    let mySupabase;

    async function loadData() {
        if (typeof supabase === 'undefined') return;
        
        // 初始化客户端
        mySupabase = supabase.createClient(SB_URL, SB_KEY);

        // 获取 URL ID，默认为 1
        const mid = new URLSearchParams(window.location.search).get('id') || 1;

        const { data, error } = await mySupabase
            .from('family_members')
            .select('*')
            .eq('id', mid)
            .single();

        if (error) {
            console.error("数据库读取失败:", error.message);
            document.getElementById('loading-screen').innerText = "数据获取失败，请检查网络或配置";
            return;
        }

        if (data) {
            console.log("数据加载成功:", data);

            // --- A. 照片显示修复 ---
            // 严格对应你的列名 photo_url
            const photoVal = data.photo_url;
            if (photoVal) {
                // 如果存的是完整链接则直接用，如果是 Storage 路径则自动补全域名
                document.getElementById('ui-photo').src = photoVal.startsWith('http') 
                    ? photoVal 
                    : `${SB_URL}/storage/v1/object/public/${photoVal}`;
            }

            // --- B. 电话号码修复 ---
            // 针对带空格的列名 'telephone number'，必须使用方括号语法
            document.getElementById('ui-phone').innerText = data['telephone number'] || '暂无号码';

            // --- C. 基础信息填充 ---
            document.getElementById('ui-name').innerText = data.name || '林氏成员';
            document.getElementById('ui-motto').innerText = data.motto || '克勤克俭，永续家风';
            document.getElementById('ui-birth').innerText = data.birth || '未知';
            document.getElementById('ui-addr').innerText = data.address || '暂无地址';
            document.getElementById('ui-bio').innerText = data.heritage || '暂无生平事迹记载。';

            // --- D. 关系展示填充 ---
            document.getElementById('ui-self').innerText = data.name || '本人';
            if (data.relationship) {
                document.getElementById('ui-parent').innerText = data.relationship;
            }

            // --- E. 切换显示 ---
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            // 初始化 Swiper 动效
            new Swiper(".mySwiper", { 
                grabCursor: true, 
                effect: "creative",
                creativeEffect: {
                    prev: { translate: [0, 0, -400], opacity: 0 },
                    next: { translate: ["100%", 0, 0] }
                }
            });
        }
    }

    // 启动加载
    window.onload = loadData;
</script>
</body>
</html>
